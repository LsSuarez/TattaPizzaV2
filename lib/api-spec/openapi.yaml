openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Tata Pizza API - Sistema de automatización de pedidos con portal cliente
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Menu management
  - name: orders
    description: Order management
  - name: customers
    description: Customer management
  - name: customer-portal
    description: Customer-facing portal endpoints (authenticated)
  - name: addresses
    description: Customer address management
  - name: ratings
    description: Order ratings
  - name: stats
    description: Statistics and dashboard data
  - name: webhook
    description: n8n webhook integration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /menu:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List all menu items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemBody"
      responses:
        "201":
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a menu item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemBody"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders with their items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithItems"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/payment:
    patch:
      operationId: updateOrderPayment
      tags: [orders]
      summary: Update order payment (submit proof or verify)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderPaymentBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/rating:
    post:
      operationId: createOrderRating
      tags: [ratings]
      summary: Submit a rating for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: phone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create or upsert a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/{id}/orders:
    get:
      operationId: getCustomerOrders
      tags: [customers]
      summary: Get orders for a specific customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithItems"

  /portal/me:
    get:
      operationId: getMyProfile
      tags: [customer-portal]
      summary: Get authenticated customer profile
      responses:
        "200":
          description: Customer profile or null if not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "401":
          description: Unauthorized
    post:
      operationId: upsertMyProfile
      tags: [customer-portal]
      summary: Create or update customer profile for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProfileBody"
      responses:
        "200":
          description: Customer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "401":
          description: Unauthorized

  /portal/orders:
    get:
      operationId: getMyOrders
      tags: [customer-portal]
      summary: Get authenticated customer's orders
      responses:
        "200":
          description: Customer's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithItems"
        "401":
          description: Unauthorized
    post:
      operationId: createMyOrder
      tags: [customer-portal]
      summary: Create an order for authenticated customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMyOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "401":
          description: Unauthorized

  /portal/orders/{id}:
    get:
      operationId: getMyOrder
      tags: [customer-portal]
      summary: Get a specific order for authenticated customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /portal/orders/{id}/payment:
    patch:
      operationId: submitMyPayment
      tags: [customer-portal]
      summary: Submit payment proof for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /portal/orders/{id}/rating:
    post:
      operationId: submitMyRating
      tags: [customer-portal]
      summary: Submit rating for a delivered order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "401":
          description: Unauthorized

  /portal/addresses:
    get:
      operationId: getMyAddresses
      tags: [addresses]
      summary: Get authenticated customer's addresses
      responses:
        "200":
          description: List of addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized
    post:
      operationId: createMyAddress
      tags: [addresses]
      summary: Add a new address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressBody"
      responses:
        "201":
          description: Created address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized

  /portal/addresses/{id}:
    patch:
      operationId: updateMyAddress
      tags: [addresses]
      summary: Update an address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddressBody"
      responses:
        "200":
          description: Updated address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteMyAddress
      tags: [addresses]
      summary: Delete an address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /webhook/whatsapp:
    post:
      operationId: whatsappWebhook
      tags: [webhook]
      summary: Webhook for n8n WhatsApp integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappWebhookBody"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappWebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        priceSmall:
          type: ["integer", "null"]
        priceMedium:
          type: ["integer", "null"]
        priceLarge:
          type: ["integer", "null"]
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - available
        - createdAt
        - updatedAt

    CreateMenuItemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        priceSmall:
          type: ["integer", "null"]
        priceMedium:
          type: ["integer", "null"]
        priceLarge:
          type: ["integer", "null"]
        available:
          type: boolean
      required:
        - name
        - category

    UpdateMenuItemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        priceSmall:
          type: ["integer", "null"]
        priceMedium:
          type: ["integer", "null"]
        priceLarge:
          type: ["integer", "null"]
        available:
          type: boolean

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        menuItemId:
          type: ["integer", "null"]
        name:
          type: string
        size:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: integer
        subtotal:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - name
        - quantity
        - unitPrice
        - subtotal
        - createdAt

    Order:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: ["integer", "null"]
        clerkUserId:
          type: ["string", "null"]
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        deliveryType:
          type: string
        status:
          type: string
        paymentMethod:
          type: ["string", "null"]
        paymentStatus:
          type: ["string", "null"]
        paymentProofUrl:
          type: ["string", "null"]
        total:
          type: integer
        notes:
          type: ["string", "null"]
        whatsappMessageId:
          type: ["string", "null"]
        rating:
          $ref: "#/components/schemas/Rating"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - customerName
        - customerPhone
        - deliveryType
        - status
        - total
        - createdAt
        - updatedAt

    OrderWithItems:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"
          required:
            - items

    CreateOrderItemBody:
      type: object
      properties:
        menuItemId:
          type: ["integer", "null"]
        name:
          type: string
        size:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: integer
      required:
        - name
        - quantity
        - unitPrice

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        deliveryType:
          type: string
        paymentMethod:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        whatsappMessageId:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
      required:
        - customerName
        - customerPhone
        - items

    CreateMyOrderBody:
      type: object
      properties:
        deliveryAddress:
          type: ["string", "null"]
        deliveryType:
          type: string
        paymentMethod:
          type: string
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
      required:
        - deliveryType
        - paymentMethod
        - items

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - status

    UpdateOrderPaymentBody:
      type: object
      properties:
        paymentStatus:
          type: string
        paymentProofUrl:
          type: ["string", "null"]
      required:
        - paymentStatus

    SubmitPaymentBody:
      type: object
      properties:
        paymentMethod:
          type: string
        paymentProofUrl:
          type: ["string", "null"]
      required:
        - paymentMethod

    Customer:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: ["string", "null"]
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: string
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - createdAt
        - updatedAt

    CustomerProfile:
      type: object
      properties:
        id:
          type: ["integer", "null"]
        clerkUserId:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        isProfileComplete:
          type: boolean
      required:
        - isProfileComplete

    UpsertProfileBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: string
        address:
          type: ["string", "null"]
      required:
        - name
        - phone

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: string
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name
        - phone

    UpdateCustomerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    Address:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        clerkUserId:
          type: ["string", "null"]
        label:
          type: string
        address:
          type: string
        district:
          type: ["string", "null"]
        reference:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - customerId
        - label
        - address
        - isDefault
        - createdAt
        - updatedAt

    CreateAddressBody:
      type: object
      properties:
        label:
          type: string
        address:
          type: string
        district:
          type: ["string", "null"]
        reference:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        isDefault:
          type: boolean
      required:
        - label
        - address

    UpdateAddressBody:
      type: object
      properties:
        label:
          type: string
        address:
          type: string
        district:
          type: ["string", "null"]
        reference:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        isDefault:
          type: boolean

    Rating:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        customerId:
          type: ["integer", "null"]
        clerkUserId:
          type: ["string", "null"]
        productRating:
          type: integer
        deliveryRating:
          type: integer
        serviceRating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - productRating
        - deliveryRating
        - serviceRating
        - createdAt

    CreateRatingBody:
      type: object
      properties:
        productRating:
          type: integer
        deliveryRating:
          type: integer
        serviceRating:
          type: integer
        comment:
          type: ["string", "null"]
      required:
        - productRating
        - deliveryRating
        - serviceRating

    DashboardStats:
      type: object
      properties:
        totalOrdersToday:
          type: integer
        pendingOrders:
          type: integer
        inPreparationOrders:
          type: integer
        readyOrders:
          type: integer
        deliveredOrdersToday:
          type: integer
        totalRevenueToday:
          type: integer
        totalCustomers:
          type: integer
        topItems:
          type: array
          items:
            $ref: "#/components/schemas/TopItem"
      required:
        - totalOrdersToday
        - pendingOrders
        - inPreparationOrders
        - readyOrders
        - deliveredOrdersToday
        - totalRevenueToday
        - totalCustomers
        - topItems

    TopItem:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
      required:
        - name
        - count

    WhatsappOrderItem:
      type: object
      properties:
        name:
          type: string
        size:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: integer
      required:
        - name
        - quantity
        - unitPrice

    WhatsappWebhookBody:
      type: object
